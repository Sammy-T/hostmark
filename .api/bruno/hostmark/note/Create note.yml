info:
  name: Create note
  type: http
  seq: 2

http:
  method: POST
  url: "{{SITE_ROOT}}/api/note"
  body:
    type: form-urlencoded
    data:
      - name: visibility
        value: "{{?visibility}}"
      - name: tags
        value: "{{?tags}}"
      - name: content
        value: "{{?content}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
