info:
  name: Get notes
  type: http
  seq: 1

http:
  method: GET
  url: "{{SITE_ROOT}}/api/note/list?page={{?page}}&page_size={{?page size}}"
  params:
    - name: page
      value: "{{?page}}"
      type: query
    - name: page_size
      value: "{{?page size}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
