info:
  name: Update account
  type: http
  seq: 3

http:
  method: POST
  url: "{{SITE_ROOT}}/api/account/{{username}}"
  body:
    type: form-urlencoded
    data:
      - name: default-visibility
        value: "{{?default note visibility}}"
      - name: role
        value: "{{?role}}"
      - name: password
        value: "{{?password}}"
      - name: current-password
        value: "{{?current password}}"
  auth: inherit

runtime:
  variables:
    - name: username
      value: "{{?username}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
